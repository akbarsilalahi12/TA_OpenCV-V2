<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parking — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

  <header class="bg-slate-800 border-b border-slate-700">
    <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="font-semibold">Parking Admin</h1>
      <a href="/" class="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-md">← Dashboard</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6 space-y-6">

    <section class="bg-slate-800 rounded-xl border border-slate-700 p-4">
      <h2 class="font-semibold mb-3">Daftar Slot</h2>
      <p class="text-xs text-slate-400 mb-3">Untuk menambah / mengubah polygon, gunakan tool desktop: <code class="bg-slate-700 px-1 rounded">python run_picker.py</code>.</p>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="text-left text-slate-400 border-b border-slate-700">
            <tr>
              <th class="py-2 pr-2">Code</th>
              <th class="py-2 pr-2">Status</th>
              <th class="py-2 pr-2">Ratio</th>
              <th class="py-2 pr-2">Polygon</th>
              <th class="py-2 pr-2">Aktif?</th>
              <th class="py-2 pr-2">Aksi</th>
            </tr>
          </thead>
          <tbody id="tbl-slots"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    let overrides = {};

    function setOverrideBtnState(slotId) {
      const tr = document.querySelector(`.btn-free[data-id="${slotId}"]`)?.closest?.("tr");
      if (!tr) return;
      const hasOverride = overrides[slotId] !== undefined;
      const status = overrides[slotId];
      tr.querySelector(".btn-free").classList.toggle("ring-2", hasOverride && status === "FREE");
      tr.querySelector(".btn-full").classList.toggle("ring-2", hasOverride && status === "FULL");
      tr.querySelector(".btn-override-clear").classList.toggle("hidden", !hasOverride);
    }

    async function loadOverrides() {
      try {
        const r = await fetch("/api/slots/overrides");
        const j = await r.json();
        overrides = j.data || {};
      } catch { overrides = {}; }
    }

    async function loadSlots() {
      await loadOverrides();
      const res = await fetch("/api/slots?active_only=false");
      const j = await res.json();
      const tbody = document.getElementById("tbl-slots");
      if (!j.data.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="py-3 text-slate-400">Belum ada slot.</td></tr>`;
        return;
      }
      tbody.innerHTML = j.data.map(s => `
        <tr class="border-b border-slate-700/50">
          <td class="py-2 pr-2 font-medium">${s.slot_code}</td>
          <td class="py-2 pr-2">
            <span class="px-2 py-0.5 rounded text-xs ${
              s.status === "FREE" ? "bg-emerald-500/20 text-emerald-300" :
              s.status === "FULL" ? "bg-rose-500/20 text-rose-300" :
              "bg-slate-700 text-slate-300"
            }">${s.status ?? "-"}</span>
            ${overrides[s.id] ? `<span class="ml-1 text-[10px] text-amber-400">(manual)</span>` : ""}
          </td>
          <td class="py-2 pr-2">${s.ratio?.toFixed?.(2) ?? "-"}</td>
          <td class="py-2 pr-2 text-xs text-slate-400">${s.polygon.length} pts</td>
          <td class="py-2 pr-2">${s.is_active ? "✅" : "❌"}</td>
          <td class="py-2 pr-2 space-x-1">
            <button data-id="${s.id}" data-active="${s.is_active}" class="btn-toggle bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded text-xs">
              ${s.is_active ? "Nonaktif" : "Aktifkan"}
            </button>
            <button data-id="${s.id}" class="btn-free bg-emerald-700 hover:bg-emerald-600 px-2 py-1 rounded text-xs">Bebas</button>
            <button data-id="${s.id}" class="btn-full bg-rose-700 hover:bg-rose-600 px-2 py-1 rounded text-xs">Penuh</button>
            <button data-id="${s.id}" class="btn-override-clear bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded text-xs">Auto</button>
            <button data-id="${s.id}" class="btn-del bg-rose-900 hover:bg-rose-800 px-2 py-1 rounded text-xs">Hapus</button>
          </td>
        </tr>
      `).join("");

      j.data.forEach(s => setOverrideBtnState(s.id));

      tbody.querySelectorAll(".btn-free").forEach(b => {
        const sid = parseInt(b.dataset.id);
        b.addEventListener("click", async () => {
          await fetch(`/api/slots/${sid}/override`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: "FREE" }),
          });
          loadSlots();
        });
      });
      tbody.querySelectorAll(".btn-full").forEach(b => {
        const sid = parseInt(b.dataset.id);
        b.addEventListener("click", async () => {
          await fetch(`/api/slots/${sid}/override`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: "FULL" }),
          });
          loadSlots();
        });
      });
      tbody.querySelectorAll(".btn-override-clear").forEach(b => {
        const sid = parseInt(b.dataset.id);
        b.addEventListener("click", async () => {
          await fetch(`/api/slots/${sid}/override`, { method: "DELETE" });
          loadSlots();
        });
      });
      tbody.querySelectorAll(".btn-del").forEach(b => b.addEventListener("click", async () => {
        if (!confirm("Soft delete slot ini?")) return;
        await fetch(`/api/slots/${b.dataset.id}`, { method: "DELETE" });
        loadSlots();
      }));
      tbody.querySelectorAll(".btn-toggle").forEach(b => b.addEventListener("click", async () => {
        const newActive = b.dataset.active === "true" ? false : true;
        await fetch(`/api/slots/${b.dataset.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ is_active: newActive }),
        });
        loadSlots();
      }));
    }

    document.addEventListener("DOMContentLoaded", loadSlots);
  </script>
</body>
</html>
